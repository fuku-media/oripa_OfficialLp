<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本玩具センターオンライン - オリパ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rampart+One&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    overflow-x: hidden;
    background: #fff;
  }

  /* ===== FV ===== */
  .fv {
    background-color: #FFD700;
    background-image:
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 14px,
        rgba(255,255,255,0.22) 14px,
        rgba(255,255,255,0.22) 15px
      );
    border-bottom: 5px solid #1a1a1a;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* FVヘッダー: 黒帯は全幅のまま */
  .fv-header {
    background: #1a1a1a;
    padding: 10px 20px;
    text-align: center;
    color: #FFD700;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.12em;
  }

  /* FVコンテンツ（フェーズ2: 上・中・下3段構成） */
  .fv-body {
    flex: 1;
    width: 100%;
    padding: 24px 20px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
  }

  /* 上: テキスト2枚 */
  .fv-top {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
  }

  /* 中: がん子 */
  .fv-middle {
    width: 100%;
    display: flex;
    justify-content: center;
  }
  .fv-ganco {
    width: 100%;
    max-width: 360px;
    display: block;
  }

  /* 下: 吹き出し（尻尾中央） */
  .fv-bottom {
    width: 100%;
    display: flex;
    justify-content: center;
  }
  .fv-fukidashi {
    width: 100%;
    max-width: 360px;
    display: block;
  }

  /* ===== フェーズ2登場アニメ用 初期状態（滑らかなフェードイン） ===== */
  .fv-top,
  .fv-ganco,
  .fv-fukidashi {
    opacity: 0;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .fv-top { transform: translateY(-20px); }
  .fv-ganco { transform: translateY(-20px); }
  .fv-fukidashi { transform: translateY(-20px); }

  .fv-top.is-in,
  .fv-ganco.is-in,
  .fv-fukidashi.is-in {
    opacity: 1;
    transform: translateY(0);
  }

  .fv-text {
    width: 100%;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 50px;
  }

  .fv-right {
    width: 100%;
    max-width: 320px;
    margin-top: 16px;
    display: flex;
    flex-direction: row;
    align-items: flex-end;
    justify-content: center;
    gap: 8px;
  }

  .fv-img-sub-pc {
    display: none;
  }

  .fv-img-sub-sp {
    width: 100%;
    max-width: 360px;
    display: block;
    margin-top: 12px;
  }

  .fv-image {
    flex: 1;
    max-width: 240px;
  }
  .fv-image img {
    width: 100%;
    display: block;
    mix-blend-mode: multiply;
  }

/* ===== FVアニメーション キーフレーム ===== */
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(10px); }
  }

  /* ===== FV画像要素スタイル ===== */
  .fv-img-catch {
    width: 100%;
    max-width: 280px;
    display: block;
  }

  .fv-img-block {
    width: 92vw;
    max-width: 400px;
    display: block;
    transform: rotate(-6deg);
  }

  .fv-arrow {
    font-size: 28px;
    color: #1a1a1a;
    display: block;
  }

  /* ===== FVオーバーレイ（フェーズ1） ===== */
  .fv-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 30px;
    padding: 24px;
    transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
  }

  /* オーバーレイ背景（画像の後ろに敷く） */
  .fv-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background-color: #FFD700;
    background-image: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 14px,
      rgba(255,255,255,0.22) 14px,
      rgba(255,255,255,0.22) 15px
    );
    z-index: -1;
  }
  .fv-overlay.fade-out {
    transform: translateY(-100%);
  }

  .fvo-catch {
    width: 80vw;
    max-width: 600px;
    display: block;
    margin: 0 auto;
    animation: fvoCatchIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  }

  .fvo-block {
    width: 92vw;
    max-width: 820px;
    display: block;
    margin: 0 auto;
    transform: rotate(-5deg);
    animation: fvoBlockIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s both;
  }

  @keyframes fvoCatchIn {
    from { opacity: 0; transform: scale(1.2); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes fvoBlockIn {
    from { opacity: 0; transform: translateY(20px) rotate(-5deg); }
    to   { opacity: 1; transform: translateY(0) rotate(-5deg); }
  }

  @keyframes fvoBlockInPc {
    from { opacity: 0; transform: translateY(20px) rotate(-5deg); }
    to   { opacity: 1; transform: translateY(0) rotate(-5deg); }
  }

  /* ===== 漫画セクション: 背景全幅 + 画像中央寄せ ===== */
  .manga-section {
    background-color: #F5EBD9;
    background-image: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 14px,
      rgba(255,255,255,0.45) 14px,
      rgba(255,255,255,0.45) 15px
    );
    border-top: 5px solid #1a1a1a;
  }

  .manga-section:last-of-type {
    border-bottom: 5px solid #1a1a1a;
  }

  .manga-section img {
    width: 100%;
    max-width: 600px;
    display: block;
    margin: 0 auto;
  }

  /* ===== リードイン文字（FV→漫画1 / 漫画1→漫画2 共通） ===== */
  .lead-text {
    background: #F5EBD9;
    border-top: 5px solid #1a1a1a;
    padding: 24px 20px 12px;
    text-align: center;
  }

  /* リードイン直後の漫画は上ボーダー不要（二重線防止） */
  .lead-text + .manga-section {
    border-top: none;
  }

  .lead-text img {
    width: 100%;
    max-width: 520px;
    display: block;
    margin: 0 auto;
    transform: rotate(-3deg);
  }

  /* 小さめバリアント（漫画2前のリードイン用） */
  .lead-text img.is-small {
    max-width: 380px;
  }

  /* ===== CTA: 背景全幅 + コンテンツ中央寄せ ===== */
  .cta-section {
    background-color: #FF6B00;
    background-image: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 14px,
      rgba(255,255,255,0.22) 14px,
      rgba(255,255,255,0.22) 15px
    );
    padding: 52px 0 64px;
    text-align: center;
  }

  .cta-inner {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .cta-eyebrow {
    display: inline-block;
    background: #fff;
    color: #FF6B00;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.1em;
    padding: 5px 18px;
    margin-bottom: 18px;
  }

  .cta-title {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    line-height: 1.5;
    margin-bottom: 32px;
    text-shadow: 2px 3px 0 rgba(0,0,0,0.25);
  }

  .cta-button {
    display: block;
    max-width: 360px;
    margin: 0 auto;
    background: #fff;
    color: #FF6B00;
    font-size: 18px;
    font-weight: 900;
    padding: 22px 32px;
    border-radius: 60px;
    text-decoration: none;
    box-shadow:
      0 7px 0 rgba(0,0,0,0.18),
      0 10px 24px rgba(0,0,0,0.2);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .cta-button:active {
    transform: translateY(4px);
    box-shadow: 0 3px 0 rgba(0,0,0,0.18);
  }

  .cta-note {
    margin-top: 22px;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    line-height: 1.7;
  }

  /* ===== PC (768px以上) ===== */
  @media (min-width: 768px) {
    /* オーバーレイ（フェーズ1）: PC用傾き -5度 + ギャップ40px */
    .fv-overlay {
      gap: 40px;
    }
    .fvo-catch {
      max-width: 650px;
    }
    .fvo-block {
      transform: rotate(-5deg);
      animation-name: fvoBlockInPc;
    }

    /* PC: 縦3段構成（center寄せ + gapで間隔制御） */
    .fv-body {
      max-width: 1080px;
      margin: 0 auto;
      padding: 32px 40px;
      justify-content: center;
      gap: 28px;
    }

    /* 上: テキスト */
    .fv-top { gap: 40px; }

    /* 中: がん子 */
    .fv-ganco { max-width: 440px; }

    /* 下: 吹き出し */
    .fv-bottom { margin-top: 0; }
    .fv-fukidashi { max-width: 520px; }

    /* テキスト画像のPC用サイズ */
    .fv-img-catch { max-width: 460px; }
    .fv-img-block { max-width: 640px; }
    .fv-arrow { font-size: 36px; }

    .manga-section img { max-width: 900px; }

    /* PC: リードイン文字 */
    .lead-text { padding: 40px 40px 20px; }
    .lead-text img { max-width: 760px; }
    .lead-text img.is-small { max-width: 560px; }

    .cta-inner { max-width: 860px; }
    .cta-title { font-size: 42px; }
    .cta-button {
      max-width: 520px;
      font-size: 22px;
      padding: 26px 48px;
    }
    .cta-note { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- フェーズ1: 全画面オーバーレイ -->
<div class="fv-overlay" id="fvOverlay">
  <img src="sozai/fvo-catch.webp" alt="オリパなら" class="fvo-catch">
  <img src="sozai/fvo-block.webp" alt="日本玩具センターオンライン" class="fvo-block">
</div>

<!-- FV（フェーズ2: 上=テキスト / 中=がん子 / 下=吹き出し） -->
<section class="fv">
  <div class="fv-body">
    <!-- 上: テキスト -->
    <div class="fv-top">
      <img src="sozai/oripa-wa.webp" alt="オリパは" class="fv-img-catch">
      <img src="sozai/todoite-kara.webp" alt="届いてからが本番" class="fv-img-block">
    </div>
    <!-- 中: がん子 -->
    <div class="fv-middle">
      <img src="sozai/ganco.webp" alt="がん子" class="fv-ganco">
    </div>
    <!-- 下: 吹き出し（尻尾中央） -->
    <div class="fv-bottom">
      <img src="sozai/fukidashi-sp.webp" alt="吹き出し" class="fv-fukidashi">
    </div>
  </div>
</section>

<!-- リードイン: こんな悩みありませんか？ -->
<section class="lead-text">
  <img src="sozai/text_konna_nayami.webp" alt="こんな悩みありませんか？">
</section>

<!-- 漫画1: 悩み → 解決宣言 -->
<section class="manga-section">
  <img src="sozai/manga1_yoko.webp" alt="オリパの悩みと日本玩具センターの解決宣言">
</section>

<!-- リードイン: 安心して遊べる理由（小さめ） -->
<section class="lead-text">
  <img src="sozai/text_anshin_asoberu.webp" alt="安心して遊べる理由" class="is-small">
</section>

<!-- 漫画2: スピード発送 + 丁寧梱包 → 安心 -->
<section class="manga-section">
  <img src="sozai/manga2.webp" alt="スピード発送・丁寧梱包で安心してオリパを引ける">
</section>

<!-- CTA -->
<section class="cta-section">
  <div class="cta-inner">
    <div class="cta-eyebrow">安心・安全のオリパサイト</div>
    <h2 class="cta-title">届くまで安心の<br>オリパサイトはこちら</h2>
    <a href="https://gangu-center.com/?cd=n4xq0z" class="cta-button">オリパを見てみる →</a>
    <p class="cta-note">梱包丁寧・スピード発送の日本玩具センターオンライン</p>
  </div>
</section>

<script>
  // フェーズ1 → フェーズ2 クロスフェード遷移
  window.addEventListener('load', () => {
    const overlay = document.getElementById('fvOverlay');

    setTimeout(() => {
      if (!overlay) return;

      // 1) オーバーレイを上にスライドアウト（0.8秒、透明化なしで被らない）
      overlay.classList.add('fade-out');

      // 2) フェーズ1完全消失（オーバーレイ削除）
      setTimeout(() => overlay.remove(), 800);

      // 3) フェーズ2: 通常FVテキスト登場（上から降りてくる）
      setTimeout(() => {
        document.querySelector('.fv-top')?.classList.add('is-in');
      }, 900);

      // 4) がん子が登場
      setTimeout(() => {
        document.querySelector('.fv-ganco')?.classList.add('is-in');
      }, 1300);

      // 5) 吹き出しが登場
      setTimeout(() => {
        document.querySelector('.fv-fukidashi')?.classList.add('is-in');
      }, 1700);
    }, 1500);
  });
</script>
</body>
</html>
